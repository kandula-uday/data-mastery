# Apache Airflow Configuration for Lakehouse Taxi Pipeline
# ============================================================

[core]
# The folder where your airflow pipelines live
dags_folder = ./dags

# The folder where airflow should store its log files
base_log_folder = ./logs

# Airflow can store logs remotely in AWS S3, Google Cloud Storage or Elastic Search.
# Set this to True if you want to enable remote logging.
remote_logging = False

# The executor class that airflow should use. Choices include
# SequentialExecutor, LocalExecutor, CeleryExecutor, DaskExecutor, KubernetesExecutor
# Note: LocalExecutor requires PostgreSQL/MySQL. Use SequentialExecutor for SQLite.
executor = SequentialExecutor

# The SqlAlchemy connection string to the metadata database.
# For local development, SQLite is sufficient
sql_alchemy_conn = sqlite:////Users/udayshankar/Documents/ML Projects/data-mastery/realworld-usecases/01-modern-lakehouse/airflow/airflow.db

# The amount of parallelism as a setting to the executor.
parallelism = 4

# The number of task instances allowed to run concurrently by the scheduler
dag_concurrency = 2

# Are DAGs paused by default at creation
dags_are_paused_at_creation = True

# The maximum number of active DAG runs per DAG
max_active_runs_per_dag = 1

# Whether to load the DAG examples that ship with Airflow
load_examples = False

# Default timezone for the Airflow webserver
default_timezone = UTC

[webserver]
# The base url of your website as airflow cannot guess what domain or
# cname you are using. This is used in automated emails that airflow sends
base_url = http://localhost:8080

# The ip specified when starting the web server
web_server_host = 0.0.0.0

# The port on which to run the web server
web_server_port = 8080

# Secret key used to run your Flask app
secret_key = temporary_key_for_development

# Whether to expose the configuration file in the web server
expose_config = False

[scheduler]
# Task instances listen for external kill signal (when you clear tasks)
job_heartbeat_sec = 5

# The scheduler constantly tries to trigger new tasks
scheduler_heartbeat_sec = 5

# Number of seconds after which a DAG file is parsed
dag_dir_list_interval = 60

# How often should the scheduler check for orphaned tasks
orphaned_tasks_check_interval = 300

[operators]
# The default owner assigned to each new operator, unless provided explicitly
default_owner = uday

[logging]
# Logging level
logging_level = INFO

# Log format
log_format = [%%(asctime)s] {%%(filename)s:%%(lineno)d} %%(levelname)s - %%(message)s
simple_log_format = %%(asctime)s %%(levelname)s - %%(message)s
